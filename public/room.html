<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>牌桌</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="wrap" id="app" v-cloak>
    <div class="topbar">
      <h1>{{ gameName }}</h1>
      <a href="/">← 大厅</a>
    </div>
    <div class="card" v-if="!createMode && !inRoom">
      <p>加入房间 <strong>{{ pendingCode || '—' }}</strong></p>
      <label>昵称</label>
      <input v-model.trim="joinNick" maxlength="24" placeholder="显示名称" autocomplete="nickname">
      <label>房间密码</label>
      <input v-model="joinPwd" type="password" maxlength="32" placeholder="房主设过密码则必填；未设密码可留空" autocomplete="current-password">
      <label>带入积分（可选）</label>
      <input v-model.trim="joinBuyIn" inputmode="numeric" placeholder="留空则用大厅默认；填写须 ≥200，无上限">
      <p class="hint">分享链接里不含密码（安全考虑），请向房主索要密码后在此填写。</p>
      <button type="button" @click="submitJoin">进入房间</button>
    </div>
    <div class="card" v-else-if="createMode && !inRoom && roomCode">
      <p>与服务器连接已断开，请刷新或返回大厅。</p>
      <button type="button" @click="location.reload()">刷新页面</button>
      <a href="/" style="display:inline-block;margin-top:8px">← 大厅</a>
    </div>
    <div class="card" v-else-if="createMode && !inRoom && !roomCode">
      <p>正在连接服务器…</p>
    </div>
    <template v-else-if="inRoom">
      <!-- 房间信息栏 -->
      <div class="room-bar">
        <span class="room-code">房间 {{ roomCode }}</span>
        <span v-if="state.handNumber > 0" class="hand-num">第{{ state.handNumber }}手</span>
        <span v-if="state.scheduledEndHands != null && state.scheduledEndHands > 0" class="schedule-tag">还剩{{ state.scheduledEndHands }}局</span>
        <span class="share-btn" @click="copyShare" title="复制分享链接">📋</span>
      </div>
      <!-- 牌桌区域 -->
      <div class="table-area">
        <div class="table-felt"></div>
        <!-- 牌桌中心信息 -->
        <div class="table-center">
          <div class="pot-display" v-if="state.phase === 'playing'">
            <span class="pot-label">底池</span>
            <span class="pot-value">{{ state.pot || 0 }}</span>
          </div>
          <div class="board-cards">
            <span v-for="(c,i) in boardDisplay" :key="'b'+i" class="card-b" :class="{red:isRed(c)}">{{ fmtCard(c) }}</span>
          </div>
          <div v-if="state.phase === 'playing'" class="street-tag">{{ streetLabel }} · 当前注 {{ state.currentBet || 0 }}</div>
          <div v-if="state.autoStartCountdown > 0" class="countdown-tag">下一局 {{ state.autoStartCountdown }}s</div>
          <div v-if="state.phase === 'lobby' && !state.gameEnded && state.handNumber === 0" class="table-hint">等待房主开始游戏</div>
          <div v-if="state.phase === 'lobby' && !state.gameEnded && state.handNumber > 0 && state.buyInWait && state.buyInWait.count > 0" class="table-hint warn-hint">
            {{ state.buyInWait.count }} 人积分为0，须局内买入后自动开局；房主可强制开局使其观战
          </div>
        </div>
        <!-- 座位 -->
        <div v-for="p in tablePlayers" :key="p.id"
          class="seat" :style="seatStyle(p.displayIndex, tablePlayers.length)"
          :class="{'seat-you': p.isYou}">
          <div class="seat-box" :class="{
            'is-actor': state.phase === 'playing' && p.seat === state.actorSeat,
            'is-folded': p.folded && state.phase === 'playing' && !p.spectating,
            'is-spectating': state.phase === 'playing' && p.spectating,
            'is-offline': p.connected === false
          }">
            <div class="dealer-badge" v-if="p.seat === state.dealerSeat">D</div>
            <div class="seat-name">{{ p.nickname }}<span v-if="p.isYou" class="you-tag">你</span></div>
            <div class="seat-chips">{{ p.chips }}</div>
            <div class="seat-cards" v-if="p.cards && p.cards.length">
              <span v-for="(c,j) in p.cards" :key="j"
                class="card-s" :class="{red:c&&!c.hidden&&isRed(c),hidden:c&&c.hidden}">{{ c&&c.hidden?'?':fmtCard(c) }}</span>
            </div>
            <div v-if="p.betStreet > 0 && state.phase === 'playing'" class="seat-bet">下注 {{ p.betStreet }}</div>
            <div v-if="p.allIn && state.phase === 'playing'" class="status-badge allin">ALL IN</div>
            <div v-if="p.spectating && state.phase === 'playing'" class="status-badge spectate">观战</div>
          </div>
        </div>
      </div>
      <!-- 上局结果快报 -->
      <div class="card result-card" v-if="state.phase === 'lobby' && state.winnersLastHand && state.winnersLastHand.length">
        <div class="result-header" @click="showLastHand = !showLastHand">
          <span>🏆 上局结果</span>
          <span class="toggle-icon">{{ showLastHand ? '▼' : '▶' }}</span>
        </div>
        <div class="result-winners">
          <span v-for="w in state.winnersLastHand" :key="w.id" class="winner-item">{{ w.nickname }} <strong>+{{ w.amount }}</strong>（{{ w.hand }}）</span>
        </div>
        <div v-if="showLastHand && state.lastHandRecord" class="hand-detail">
          <div class="detail-board" v-if="state.lastHandRecord.board && state.lastHandRecord.board.length">
            <span class="detail-label">公共牌</span>
            <span v-for="(c,i) in state.lastHandRecord.board" :key="'d'+i" class="card-s" :class="{red:isRed(c)}">{{ fmtCard(c) }}</span>
          </div>
          <div class="detail-players">
            <div v-for="dp in state.lastHandRecord.players" :key="dp.id" class="detail-player">
              <span class="dp-name">{{ dp.nickname }}</span>
              <span class="dp-cards" v-if="dp.cards && dp.cards.length">
                <span v-for="(c,j) in dp.cards" :key="j" class="card-xs" :class="{red:isRed(c)}">{{ fmtCard(c) }}</span>
              </span>
              <span v-if="dp.folded" class="dp-fold">弃牌</span>
              <span class="dp-delta" :class="{'profit': dp.chipChange > 0, 'loss': dp.chipChange < 0}">{{ dp.chipChange > 0 ? '+' : '' }}{{ dp.chipChange }}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="card rebuy-card" v-if="state.phase === 'lobby' && !state.gameEnded && myPlayer && myPlayer.chips === 0">
        <div class="rebuy-title">局内买入</div>
        <p class="hint" style="margin:0 0 8px">积分已清零，买入≥200 后可参与下一局自动开局；若房主强制开局，本局仅观战。</p>
        <div class="rebuy-row">
          <input v-model.trim="rebuyBuyIn" inputmode="numeric" class="rebuy-input" placeholder="买入积分">
          <button type="button" class="act-btn primary" @click="sendRebuy">确认买入</button>
        </div>
      </div>
      <!-- 操作区 -->
      <div class="card action-card" v-if="state.phase === 'playing' && legal.length">
        <div class="actions">
          <button type="button" class="act-btn danger" v-if="legal.indexOf('fold') >= 0" @click="sendAct('fold')">弃牌</button>
          <button type="button" class="act-btn secondary" v-if="legal.indexOf('check') >= 0" @click="sendAct('check')">过牌</button>
          <button type="button" class="act-btn primary" v-if="legal.indexOf('call') >= 0" @click="sendAct('call')">跟注 {{ callAmount }}</button>
        </div>
        <div v-if="legal.indexOf('bet') >= 0 || legal.indexOf('raise') >= 0" class="raise-area">
          <div class="raise-slider-row">
            <input type="range" v-model.number="raiseTo" :min="minRaiseTo" :max="maxRaiseTo" step="1" class="raise-slider">
          </div>
          <div class="raise-input-row">
            <input type="number" v-model.number="raiseTo" :min="minRaiseTo" :max="maxRaiseTo" class="raise-input">
            <button type="button" class="act-btn accent" v-if="legal.indexOf('bet') >= 0" @click="sendAct('bet')">下注</button>
            <button type="button" class="act-btn accent" v-if="legal.indexOf('raise') >= 0" @click="sendAct('raise')">加注</button>
          </div>
          <div class="quick-bets">
            <button type="button" class="qb" @click="raiseTo = minRaiseTo">最小</button>
            <button type="button" class="qb" @click="raiseTo = Math.min(Math.floor(state.pot * 0.5 + (myBetStreet || 0)), maxRaiseTo)">½底池</button>
            <button type="button" class="qb" @click="raiseTo = Math.min(state.pot + (myBetStreet || 0), maxRaiseTo)">底池</button>
            <button type="button" class="qb" @click="raiseTo = maxRaiseTo">全下</button>
          </div>
        </div>
      </div>
      <!-- 底部控制 -->
      <div class="card bottom-ctrl">
        <div class="ctrl-row">
          <button type="button" v-if="isHost && state.phase === 'lobby' && !state.gameEnded" @click="startHand" class="start-btn">
            {{ state.handNumber === 0 ? '开始第一手' : '立即开始下一手' }}
          </button>
          <button type="button" v-if="isHost && !state.gameEnded" class="secondary" @click="showSchedule = true">
            {{ state.scheduledEndHands != null ? '修改预约 (' + state.scheduledEndHands + '局)' : '预约结束' }}
          </button>
          <button type="button" class="secondary" @click="showStats = true">本场统计</button>
        </div>
        <div class="ctrl-row secondary-row">
          <button type="button" class="secondary sm" @click="guide = true">操作说明</button>
          <button type="button" class="secondary sm" @click="ping">延迟 {{ latencyMs }}ms</button>
        </div>
      </div>
      <!-- 游戏结束弹窗 -->
      <div class="modal-mask" v-if="state.gameEnded">
        <div class="modal game-over-modal">
          <h2>🎯 本场游戏结束</h2>
          <p class="hint" style="margin:0 0 12px">共进行 {{ state.handNumber }} 手</p>
          <table class="stats-table">
            <thead><tr><th>玩家</th><th>买入</th><th>剩余</th><th>盈亏</th></tr></thead>
            <tbody>
              <tr v-for="s in sessionStats" :key="s.id">
                <td>{{ s.nickname }}</td>
                <td>{{ s.buyIn }}</td>
                <td>{{ s.chips }}</td>
                <td :class="{'profit': s.profit > 0, 'loss': s.profit < 0}">
                  <strong>{{ s.profit > 0 ? '+' : '' }}{{ s.profit }}</strong>
                </td>
              </tr>
            </tbody>
          </table>
          <button type="button" v-if="isHost" @click="newSession" style="margin-top:12px">开始新一场</button>
          <a href="/" class="back-link">返回大厅</a>
        </div>
      </div>
      <!-- 本场统计弹窗 -->
      <div class="modal-mask" v-if="showStats" @click.self="showStats = false">
        <div class="modal">
          <button type="button" class="close" @click="showStats = false">✕</button>
          <h2>本场统计</h2>
          <p class="hint" style="margin:0 0 8px">已进行 {{ state.handNumber }} 手</p>
          <table class="stats-table">
            <thead><tr><th>玩家</th><th>买入</th><th>剩余</th><th>盈亏</th></tr></thead>
            <tbody>
              <tr v-for="s in sessionStats" :key="s.id">
                <td>{{ s.nickname }}</td>
                <td>{{ s.buyIn }}</td>
                <td>{{ s.chips }}</td>
                <td :class="{'profit': s.profit > 0, 'loss': s.profit < 0}">
                  <strong>{{ s.profit > 0 ? '+' : '' }}{{ s.profit }}</strong>
                </td>
              </tr>
            </tbody>
          </table>
          <button type="button" @click="showStats = false" style="margin-top:10px">关闭</button>
        </div>
      </div>
      <!-- 预约结束弹窗 -->
      <div class="modal-mask" v-if="showSchedule" @click.self="showSchedule = false">
        <div class="modal">
          <button type="button" class="close" @click="showSchedule = false">✕</button>
          <h2>预约结束</h2>
          <p class="hint" style="margin:0 0 10px">设置几局后自动结束本场游戏，届时将展示盈亏统计。</p>
          <div class="schedule-btns">
            <button type="button" @click="scheduleEnd(1)">1局后</button>
            <button type="button" @click="scheduleEnd(3)">3局后</button>
            <button type="button" @click="scheduleEnd(5)">5局后</button>
            <button type="button" @click="scheduleEnd(10)">10局后</button>
          </div>
          <div class="schedule-custom">
            <input type="number" v-model.number="customEndHands" min="1" max="100" placeholder="自定义局数">
            <button type="button" @click="scheduleEnd(customEndHands)">确定</button>
          </div>
          <button type="button" class="danger" v-if="state.scheduledEndHands != null" @click="cancelSchedule" style="margin-top:8px">取消预约</button>
          <button type="button" class="secondary" @click="showSchedule = false" style="margin-top:6px">关闭</button>
        </div>
      </div>
      <!-- 操作说明弹窗 -->
      <div class="modal-mask" v-if="guide" @click.self="guide = false">
        <div class="modal">
          <button type="button" class="close" @click="guide = false">✕</button>
          <h2>操作说明</h2>
          <ul class="hint" style="padding-left:18px;margin:0;color:var(--text)">
            <li>轮到你会高亮座位边框；点击跟注/弃牌/过牌/下注。</li>
            <li>「下注/加注」填写<strong>本轮累计目标总下注额</strong>，可使用滑块或快捷按钮。</li>
            <li>入座时可填带入积分（≥200，不设上限）；留空则用配置默认。</li>
            <li>一局结束后将自动开始下一局（5秒倒计时）。</li>
            <li>房主可预约结束：设置几局后结束，届时自动展示盈亏统计。</li>
            <li>积分变动在每局结束后写入排行榜。</li>
          </ul>
          <button type="button" @click="guide = false">关闭</button>
        </div>
      </div>
    </template>
    <div class="toast" v-if="toast">{{ toast }}</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
  <script>
  function pid() {
    let id = localStorage.getItem('poker_pid');
    if (!id) { id = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('poker_pid', id); }
    return id;
  }
  function qs(name) {
    try { return new URL(location.href).searchParams.get(name) || ''; } catch (e) { return ''; }
  }
  function parseRoomCodeFromHash() {
    let raw = (location.hash || '').replace(/^#/, '');
    const qi = raw.indexOf('?');
    if (qi >= 0) raw = raw.slice(0, qi);
    return raw.toUpperCase().replace(/[^A-Z0-9]/g, '');
  }
  new Vue({
    el: '#app',
    data: {
      gameName: '好友德州扑克',
      createMode: false,
      inRoom: false,
      pendingCode: '',
      joinNick: '',
      joinPwd: '',
      joinBuyIn: '',
      roomCode: '',
      playerId: pid(),
      state: { phase: 'lobby', players: [], pot: 0, board: [], scoring: {}, sessionStats: [], autoStartCountdown: 0, scheduledEndHands: null, gameEnded: false, handNumber: 0, buyInWait: { count: 0, nicknames: [] } },
      rebuyBuyIn: '',
      isHost: false,
      raiseTo: 0,
      toast: '',
      guide: false,
      latencyMs: '—',
      ws: null,
      showLastHand: false,
      showSchedule: false,
      showStats: false,
      customEndHands: 3
    },
    computed: {
      fullShare() {
        if (!this.roomCode) return '';
        return location.origin + '/room.html#' + this.roomCode;
      },
      boardDisplay() { return this.state.board || []; },
      legal() { return this.state.legalActions || []; },
      streetLabel() {
        const m = { preflop: '翻牌前', flop: '翻牌', turn: '转牌', river: '河牌' };
        return m[this.state.street] || (this.state.street || '—');
      },
      myPlayer() { return (this.state.players || []).find(x => x.isYou); },
      myBetStreet() { return this.myPlayer ? this.myPlayer.betStreet : 0; },
      callAmount() {
        if (!this.myPlayer) return 0;
        return Math.min(Math.max(0, (this.state.currentBet || 0) - this.myPlayer.betStreet), this.myPlayer.chips);
      },
      minRaiseTo() {
        if (!this.myPlayer || !this.state.scoring) return 0;
        return (this.state.currentBet || 0) + (this.state.scoring.bigBlind || 10);
      },
      maxRaiseTo() {
        const p = this.myPlayer;
        if (!p || !this.state.scoring) return 0;
        const cap = this.state.scoring.maxBetPerRound || 99999;
        return Math.min(p.betStreet + p.chips, cap);
      },
      tablePlayers() {
        const ps = (this.state.players || []).slice();
        if (!ps.length) return [];
        ps.sort((a, b) => a.seat - b.seat);
        const myIdx = ps.findIndex(p => p.isYou);
        if (myIdx < 0) return ps.map((p, i) => Object.assign({}, p, { displayIndex: i }));
        const rotated = ps.slice(myIdx).concat(ps.slice(0, myIdx));
        return rotated.map((p, i) => Object.assign({}, p, { displayIndex: i }));
      },
      sessionStats() {
        return (this.state.sessionStats || []).slice().sort((a, b) => b.profit - a.profit);
      }
    },
    mounted() {
      fetch('/api/config').then(r => r.json()).then(c => {
        if (c.gameName) { this.gameName = c.gameName; document.title = c.gameName + ' · 牌桌'; }
      }).catch(() => {});
      this.createMode = qs('create') === '1';
      this.joinNick = (qs('nick') || localStorage.getItem('poker_nick') || '玩家').slice(0, 24);
      this.joinPwd = qs('pwd');
      this.joinBuyIn = qs('buyin');
      if (this.createMode) {
        const pwd = qs('pwd');
        const nick = this.joinNick || '玩家';
        const buyPayload = {};
        const b = qs('buyin');
        if (b !== '' && b != null) buyPayload.buyIn = b;
        localStorage.setItem('poker_nick', nick);
        this.connectWs(() => {
          this.ws.send(JSON.stringify(Object.assign({ type: 'createRoom', password: pwd, nickname: nick, playerId: this.playerId }, buyPayload)));
        });
        return;
      }
      const code = parseRoomCodeFromHash();
      if (code.length < 4) {
        this.showToast('房间号无效，请从大厅加入或检查链接');
        return;
      }
      this.pendingCode = code;
    },
    methods: {
      connectWs(onOpenSend) {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = proto + '//' + location.host;
        if (this.ws && this.ws.readyState === WebSocket.OPEN) {
          if (typeof onOpenSend === 'function') onOpenSend();
          return;
        }
        if (this.ws) { try { this.ws.close(); } catch (e) {} }
        this.ws = new WebSocket(url);
        this.ws.onopen = () => { if (typeof onOpenSend === 'function') onOpenSend(); };
        this.ws.onmessage = (ev) => {
          let m;
          try { m = JSON.parse(ev.data); } catch (e) { return; }
          if (m.type === 'joined') {
            this.inRoom = true;
            this.roomCode = m.roomCode;
            this.playerId = m.playerId;
            if (typeof m.isHost === 'boolean') this.isHost = m.isHost;
            localStorage.setItem('poker_pid', m.playerId);
            history.replaceState(null, '', '/room.html#' + m.roomCode);
          }
          if (m.type === 'state') {
            this.state = m.payload;
            const p = (this.state.players || []).find(x => x.isYou);
            if (p) this.raiseTo = Math.min(this.maxRaiseTo, Math.max(this.minRaiseTo, (this.state.currentBet || 0) + (this.state.scoring && this.state.scoring.bigBlind)));
          }
          if (m.type === 'error') this.showToast(m.message);
          if (m.type === 'pong') this.latencyMs = Math.max(0, Date.now() - m.t);
        };
        this.ws.onclose = () => {
          if (this.inRoom) this.showToast('连接已断开');
          this.inRoom = false;
        };
        this.ws.onerror = () => { this.showToast('连接失败'); };
      },
      submitJoin() {
        const nick = (this.joinNick || '玩家').slice(0, 24);
        localStorage.setItem('poker_nick', nick);
        const pwd = typeof this.joinPwd === 'string' ? this.joinPwd.trim() : '';
        const code = this.pendingCode;
        if (!code || code.length < 4) { this.showToast('房间号无效'); return; }
        const payload = { type: 'joinRoom', roomCode: code, password: pwd, nickname: nick, playerId: this.playerId };
        const jb = typeof this.joinBuyIn === 'string' ? this.joinBuyIn.trim() : '';
        if (jb !== '') payload.buyIn = jb;
        this.connectWs(() => { this.ws.send(JSON.stringify(payload)); });
      },
      showToast(t) { this.toast = t; setTimeout(() => { this.toast = ''; }, 2800); },
      fmtCard(c) {
        if (!c || c.hidden) return '';
        const map = { 11: 'J', 12: 'Q', 13: 'K', 14: 'A' };
        const r = c.r <= 10 ? String(c.r) : map[c.r];
        const s = { s: '♠', h: '♥', d: '♦', c: '♣' }[c.s] || c.s;
        return r + s;
      },
      isRed(c) { return c && (c.s === 'h' || c.s === 'd'); },
      sendAct(action) {
        const need = action === 'raise' || action === 'bet';
        let raiseTo;
        if (need) { const x = Number(this.raiseTo); raiseTo = Number.isFinite(x) ? x : undefined; }
        this.ws.send(JSON.stringify({ type: 'action', action, raiseTo }));
      },
      startHand() { this.ws.send(JSON.stringify({ type: 'startHand' })); },
      sendRebuy() {
        const jb = typeof this.rebuyBuyIn === 'string' ? this.rebuyBuyIn.trim() : '';
        if (!jb) { this.showToast('请填写买入积分'); return; }
        if (!this.ws || this.ws.readyState !== WebSocket.OPEN) { this.showToast('未连接'); return; }
        this.ws.send(JSON.stringify({ type: 'rebuy', buyIn: jb }));
      },
      ping() {
        if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
        this.ws.send(JSON.stringify({ type: 'ping', t: Date.now() }));
      },
      seatStyle(displayIndex, totalSeats) {
        if (totalSeats <= 0) return {};
        const angle = (2 * Math.PI * displayIndex) / totalSeats;
        var rx, ry;
        if (window.innerWidth <= 480) { rx = 40; ry = 40; } else { rx = 43; ry = 40; }
        return {
          left: (50 + rx * Math.sin(angle)) + '%',
          top: (50 + ry * Math.cos(angle)) + '%'
        };
      },
      copyShare() {
        if (!navigator.clipboard) { this.showToast('请手动复制链接'); return; }
        navigator.clipboard.writeText(this.fullShare).then(() => this.showToast('链接已复制')).catch(() => this.showToast('复制失败'));
      },
      scheduleEnd(hands) {
        const n = Math.floor(Number(hands));
        if (!n || n < 1 || n > 100) { this.showToast('请输入1-100的局数'); return; }
        this.ws.send(JSON.stringify({ type: 'scheduleEnd', hands: n }));
        this.showSchedule = false;
      },
      cancelSchedule() {
        this.ws.send(JSON.stringify({ type: 'scheduleEnd', cancel: true }));
        this.showSchedule = false;
      },
      newSession() { this.ws.send(JSON.stringify({ type: 'newSession' })); }
    }
  });
  </script>
  <style>[v-cloak]{display:none}</style>
</body>
</html>
