# Render 免费 Web Service（Docker）。无持久盘：排行榜/SQLite 在重部署或休眠恢复后可能清空，适合朋友临时玩。
# 使用：New → Blueprint → 选仓库。
version: "1"
services:
  - type: web
    name: friend-poker
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
